<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Chat</title>
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>

  <style>
    :root {
      --bg: #0F1113;
      --panel: #191B1E;
      --muted: #8b949e;
      --bubble: #242628;
      --accent: #0066CC;
      --radius: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 12px);
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: #e6eef6;
      font-family: Inter, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden; /* 防止因为键盘弹起或输入框等挤压出现整体滚动 */
    }

    /* 采用绝对定位布局配合内垫片实现玻璃模糊穿透 */
    .app { 
      position: relative;
      height: 100%; 
      overflow: hidden; 
    }

    header {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 10px 12px;
      background: rgba(25, 27, 30, 0.65);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      min-height: 60px;
      box-sizing: border-box;
    }

    /* AI状态头部样式 */
    .ai-box { display: flex; flex-direction: column; justify-content: center; height: 42px; }
    .ai-title { font-weight: 600; font-size: 16px; letter-spacing: 0.2px; display: flex; align-items: center; transition: all 0.3s; }
    .signature { font-size: 12px; color: var(--muted); margin-top: 4px; transition: all 0.3s; height: 14px; overflow: hidden; }
    .signature.hidden { height: 0; opacity: 0; margin-top: 0; }

    .header-actions { display: flex; gap: 8px; }
    .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; display:flex; align-items:center; justify-content:center; padding: 6px; border-radius: 6px;}
    .icon-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }

    main {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-sizing: border-box;
    }

    /* 上下占位以使得滚动在脱离头部和底部区域时不会被完全遮挡 */
    main::before {
      content: "";
      display: block;
      flex-shrink: 0;
      height: var(--header-height, 60px);
    }
    main::after {
      content: "";
      display: block;
      flex-shrink: 0;
      height: var(--bottom-height, 80px);
    }

    .messages { display: flex; flex-direction: column; gap: 12px; align-items: stretch; }

    .msg {
      max-width: 85%;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
      background: var(--bubble);
      animation: msgSlideIn 0.4s cubic-bezier(0.2, 0.9, 0.4, 1) backwards;
    }
    .msg.no-anim { animation: none; }
    .msg.user { margin-left: auto; text-align: left; background: var(--accent); }
    .msg.ai { margin-right: auto; text-align: left; position: relative; }
    .msg.ai.group-follow { margin-top: -8px; border-top-left-radius: 4px; }

    .msg-content { display: flex; flex-direction: column; }
    .meta { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
    .nick { font-weight: 700; color: #fff; display: flex; align-items: center; }

    /* 等待AI回复时的加载动画 */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px;
      margin-right: auto;
      animation: msgSlideIn 0.4s cubic-bezier(0.2, 0.9, 0.4, 1) backwards;
    }
    .typing-indicator span {
      width: 6px;
      height: 6px;
      background-color: var(--muted);
      border-radius: 50%;
      animation: typingPulse 1.4s infinite ease-in-out both;
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes typingPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 12px 12px calc(12px + var(--safe-bottom));
      background: rgba(25, 27, 30, 0.65);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      z-index: 100;
      box-sizing: border-box;
    }

    .composer { display: flex; gap: 8px; align-items: flex-end; }
    textarea#input {
      flex: 1; min-height: 44px; max-height: 160px;
      border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.08);
      background: #1a1c1e; padding: 12px 14px; color: #e6eef6;
      resize: none; font-size: 15px; overflow-y: auto; line-height: 1.4;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease; box-sizing: border-box;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    textarea#input::-webkit-scrollbar { display: none; }
    textarea#input:disabled { opacity: 0.5; background: #111; cursor: not-allowed; }
    textarea.collapsed { height: 44px; }

    .send-btn {
      background: var(--accent); color: white; height: 44px; padding: 0 16px;
      border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Markdown 样式 */
    .msg pre { background: #0b0c0d; border-radius: 8px; padding: 36px 12px 12px; margin: 6px 0; overflow: auto; font-family: ui-monospace, monospace; font-size: 13px; line-height: 1.45; border: 1px solid rgba(255, 255, 255, 0.04); position: relative; }
    .msg code.inline { background: rgba(255, 255, 255, 0.05); padding: 2px 6px; border-radius: 6px; font-family: ui-monospace, monospace; font-size: 13px; color: #ff7b72; }
    .msg table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    .msg th, .msg td { border: 1px solid rgba(255,255,255,0.1); padding: 6px 8px; font-size: 14px;}
    .msg th { background: rgba(255,255,255,0.05); }
    .msg h1, .msg h2, .msg h3 { margin: 8px 0 6px; color: #fff; }
    .msg p { margin: 6px 0; }
    .msg ul, .msg ol { margin: 6px 0 8px 18px; padding: 0; }
    .msg blockquote { margin: 6px 0; padding: 8px 12px; border-left: 3px solid var(--accent); color: var(--muted); background: rgba(255, 255, 255, 0.02); border-radius: 0 8px 8px 0; }
    .msg a { color: var(--accent); text-decoration: none; }

    .code-controls { position: absolute; top: 4px; right: 4px; display: flex; gap: 6px; align-items: center; z-index: 5; }
    .copy-btn { background: rgba(255, 255, 255, 0.1); color: #e6eef6; border: none; padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; }
    .lang-badge { color: var(--muted); padding: 4px 6px; font-size: 11px; position: absolute; top: 8px; left: 12px; font-weight: 600; text-transform: uppercase;}

    /* 深度思考 UI */
    .reasoning-box { margin-bottom: 8px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 10px; color: var(--muted); font-size: 13px; line-height: 1.5; overflow: hidden; }
    .reasoning-toggle { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; cursor: pointer; background: rgba(255, 255, 255, 0.01); }
    .reasoning-toggle:hover { background: rgba(255, 255, 255, 0.03); }
    .reason-label { font-size: 13px; font-weight: 600; color: #aaa; display: flex; align-items: center; gap: 6px; }
    .reasoning-toggle button { background: rgba(255, 255, 255, 0.05); border: none; color: #fff; cursor: pointer; font-size: 12px; padding: 4px 10px; border-radius: 6px; font-weight: 600; transition: background 0.2s; }
    .reasoning-toggle button:hover { background: rgba(255, 255, 255, 0.15); }
    
    .reasoning-content { padding: 8px 12px; border-top: 1px solid rgba(255, 255, 255, 0.03); font-family: inherit; word-break: break-word; }
    .reasoning-content > *:first-child { margin-top: 0; }
    .reasoning-content > *:last-child { margin-bottom: 0; }
    .reasoning-content h1, .reasoning-content h2, .reasoning-content h3 { font-size: 14px; color: #ddd; margin: 6px 0 4px; }
    .reasoning-content p { margin: 4px 0; }
    .reasoning-content ul, .reasoning-content ol { margin: 4px 0 4px 18px; padding: 0; }
    .reasoning-content strong { color: #ddd; }
    .reasoning-content pre { background: #0b0c0d; border-radius: 6px; padding: 32px 10px 10px; margin: 6px 0; overflow: auto; font-family: ui-monospace, monospace; font-size: 12px; border: 1px solid rgba(255, 255, 255, 0.04); position: relative;}
    .reasoning-content code.inline { background: rgba(255, 255, 255, 0.05); padding: 2px 4px; border-radius: 4px; font-family: ui-monospace, monospace; font-size: 12px; color: #ff7b72; }

    /* 记忆列表和通知 UI */
    .memory-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 8px; padding: 8px; background: #151719; }
    .memory-item { display: flex; gap: 8px; background: rgba(255, 255, 255, 0.03); padding: 8px; border-radius: 6px; align-items: flex-start; }
    .memory-text { flex: 1; font-size: 13px; color: #e6eef6; outline: none; }
    .memory-text[contenteditable="true"] { background: rgba(0,0,0,0.3); padding: 4px; border-radius: 4px; border: 1px solid var(--accent); }
    .memory-actions { display: flex; gap: 6px; }
    .memory-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; }
    .memory-btn:hover { color: #fff; }

    .memory-notice-box { margin-top: 8px; background: rgba(40, 60, 80, 0.4); border: 1px solid rgba(0, 102, 204, 0.3); border-radius: 8px; padding: 8px 10px; font-size: 12px; color: #e6eef6; }
    .memory-notice-header { font-weight: 600; color: #8cb4ff; display: flex; justify-content: space-between; cursor: pointer; align-items: center; user-select: none; }
    .memory-notice-header:hover { opacity: 0.8; }
    .memory-notice-details { border-top: 1px solid rgba(0,102,204,0.3); margin-top: 8px; padding-top: 8px; }

    /* Modals */
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); display: none; justify-content: center; align-items: center; z-index: 200; backdrop-filter: blur(2px); }
    .modal.active { display: flex; }
    .modal-content { background: var(--panel); padding: 20px; border-radius: var(--radius); width: 90%; max-width: 480px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; gap: 12px; max-height: 85vh; overflow-y: auto; }
    .modal-content h2 { margin: 0; font-size: 18px; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
    .modal-row { display: flex; flex-direction: column; gap: 6px; }
    .modal-row label { color: var(--muted); font-size: 13px; }
    .modal-content input[type="text"], .modal-content input[type="password"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.08); background: #0F1113; color: #fff; outline: none; box-sizing: border-box; }
    .modal-content select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.08); background: #0F1113; color: #fff; outline: none; }
    .modal-content textarea { width: 100%; min-height: 80px; padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.08); background: #0F1113; color: #fff; outline: none; box-sizing: border-box; resize: vertical; }
    
    .modal-row-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255, 255, 255, 0.05); color: #fff; width: 100%; text-align: left; display: flex; justify-content: space-between; padding: 12px; border-radius: 8px; cursor: pointer; align-items: center; font-size: 14px; transition: background 0.2s;}
    .modal-row-btn:hover { background: rgba(255,255,255,0.06); }
    .modal-row-btn span { color: var(--muted); font-size: 12px; }

    .toggle-row { display: flex; align-items: center; gap: 10px; justify-content: space-between; }
    .toggle-desc { color: var(--muted); font-size: 13px; }
    
    /* Toggle Switch */
    .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.1); transition: .4s; border-radius: 22px; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: var(--accent); }
    input:checked + .slider:before { transform: translateX(18px); }

    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
    .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
    .btn.save { background: var(--accent); color: #fff; }
    .btn.close { background: transparent; color: var(--muted); border: 1px solid rgba(255,255,255,0.1); }

    @keyframes msgSlideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div class="ai-box">
      <div class="ai-title" id="ui-nickname">New Friend</div>
      <div class="signature" id="ui-bio">Say hello to your new AI friend</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="clearChat()" title="清空对话">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
        </svg>
      </button>
      <button class="icon-btn" onclick="openSettings()" title="设置">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </div>
  </header>

  <main class="messages" id="chat-container"></main>

  <div class="bottom">
    <div class="composer">
      <textarea id="input" class="collapsed" placeholder="Type a message..." rows="1"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">发送</button>
    </div>
  </div>
</div>

<!-- 主设置 Modal -->
<div class="modal" id="settings-modal">
  <div class="modal-content">
    <h2>设置</h2>
    
    <div class="modal-row">
      <label>模型服务商</label>
      <select id="cfg-engine" onchange="switchEngine()">
        <option value="deepseek">DeepSeek (API)</option>
        <option value="gemini">Google Gemini (API)</option>
      </select>
    </div>

    <div class="modal-row">
      <label>API Key</label>
      <input type="text" id="cfg-apikey" placeholder="输入对应模型的 API Key" oninput="updateTempKey()">
    </div>

    <div class="modal-row">
      <label>昵称 Name</label>
      <input type="text" id="cfg-nickname" placeholder="New Friend">
    </div>

    <div class="modal-row">
      <label>个性签名 Tagline</label>
      <input type="text" id="cfg-bio" placeholder="Say hello to your new AI friend">
    </div>

    <div class="modal-row">
      <label>人设 Prompt</label>
      <textarea id="cfg-personality" placeholder="你是一个有用的助手..."></textarea>
    </div>

    <div class="toggle-row">
      <div class="toggle-desc">
        <strong>深度思考</strong><br>
        <span style="font-size:11px">若开启记忆功能建议开启，否则将会污染记忆</span>
      </div>
      <label class="switch"><input type="checkbox" id="cfg-thinking"><span class="slider"></span></label>
    </div>

    <div class="toggle-row">
      <div class="toggle-desc">
        <strong>沉浸模式</strong><br>
        <span style="font-size:11px">获得类似于真人的对话体验</span>
      </div>
      <label class="switch"><input type="checkbox" id="cfg-immersive"><span class="slider"></span></label>
    </div>

    <div class="toggle-row">
      <div class="toggle-desc">
        <strong>默认折叠思维链</strong><br>
        <span style="font-size:11px">开启后思维链将不进行默认地展开</span>
      </div>
      <label class="switch"><input type="checkbox" id="cfg-fold-thinking"><span class="slider"></span></label>
    </div>

    <div class="toggle-row">
      <div class="toggle-desc">
        <strong>记忆功能</strong><br>
        <span style="font-size:11px">允许AI长期记住信息，即使是清除对话后</span>
      </div>
      <label class="switch"><input type="checkbox" id="cfg-memory" onchange="toggleMemoryUI()"><span class="slider"></span></label>
    </div>

    <div class="modal-row" id="memory-manage-row" style="display: none; margin-top: 4px;">
      <button class="modal-row-btn" onclick="openMemoryModal()">
        管理记忆库 <span>></span>
      </button>
    </div>

    <div class="toggle-row">
      <div class="toggle-desc">
        <strong>开场白</strong><br>
        <span style="font-size:11px">想让AI给你打招呼吗？</span>
      </div>
      <label class="switch"><input type="checkbox" id="cfg-greeting" onchange="toggleGreetingUI()"><span class="slider"></span></label>
    </div>

    <div class="modal-row" id="greeting-manage-row" style="display: none; margin-top: 4px;">
      <button class="modal-row-btn" onclick="openGreetingModal()">
        管理开场白 <span>></span>
      </button>
    </div>

    <div class="modal-actions">
      <button class="btn close" onclick="closeSettings()">取消</button>
      <button class="btn save" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<!-- 二级管理弹窗：记忆库 -->
<div class="modal" id="memory-modal" style="z-index: 210;">
  <div class="modal-content">
    <h2>记忆库管理</h2>
    <div class="memory-list" id="memory-list" style="max-height: 40vh; margin-top: 10px;"></div>
    <div style="display:flex; gap:8px;">
      <input type="text" id="new-memory-input" placeholder="手动添加记忆..." style="flex:1; padding:8px; border-radius:6px; background:#0F1113; border:1px solid rgba(255,255,255,0.1); color:#fff; font-size: 13px;">
      <button class="btn save" style="padding:6px 12px;" onclick="manualAddMemory()">添加</button>
    </div>
    <div class="modal-actions">
      <button class="btn close" onclick="closeMemoryModal()">完成</button>
    </div>
  </div>
</div>

<!-- 二级管理弹窗：开场白 -->
<div class="modal" id="greeting-modal" style="z-index: 210;">
  <div class="modal-content">
    <h2>开场白管理</h2>
    <div class="memory-list" id="greeting-list" style="max-height: 40vh; margin-top: 10px;"></div>
    <div style="display:flex; gap:8px;">
      <input type="text" id="new-greeting-input" placeholder="手动添加开场白..." style="flex:1; padding:8px; border-radius:6px; background:#0F1113; border:1px solid rgba(255,255,255,0.1); color:#fff; font-size: 13px;">
      <button class="btn save" style="padding:6px 12px;" onclick="manualAddGreeting()">添加</button>
    </div>
    <div class="modal-actions">
      <button class="btn close" onclick="closeGreetingModal()">完成</button>
    </div>
  </div>
</div>

<!-- 确认与提示框通用模态 -->
<div class="modal" id="confirm-modal" style="z-index: 300;">
  <div class="modal-content" style="max-width: 320px;">
    <h2 id="confirm-title" style="border:none; padding-bottom: 0;">确认</h2>
    <div style="color: var(--muted); font-size: 14px; margin: 10px 0;" id="confirm-msg"></div>
    <div class="modal-actions">
      <button class="btn close" id="confirm-cancel" onclick="closeConfirmModal()">取消</button>
      <button class="btn save" id="confirm-btn">确定</button>
    </div>
  </div>
</div>

<!-- Error Alert Modal -->
<div class="modal" id="alert-modal" style="z-index: 300;">
  <div class="modal-content" style="max-width: 320px;">
    <h2 id="alert-title" style="border:none; padding-bottom: 0; color: #0066CC;">错误</h2>
    <div style="color: var(--muted); font-size: 14px; margin: 10px 0;" id="alert-msg"></div>
    <div id="alert-detail-box" style="display:none; margin-top:10px; padding:8px; background:rgba(0,0,0,0.3); border-radius:6px; font-size:12px; color:#ccc; word-break:break-all; max-height:150px; overflow-y:auto; font-family:monospace;"></div>
    <div class="modal-actions" style="justify-content: space-between; align-items: center; margin-top: 16px;">
      <button class="btn close" id="alert-detail-btn" onclick="toggleAlertDetail()" style="font-size:12px; padding:4px 8px; margin:0;">查看详情</button>
      <button class="btn save" id="alert-ok-btn" onclick="closeAlertModal()" style="margin-left:auto;">确定</button>
    </div>
  </div>
</div>

<script>

//全局配置与状态管理
const DEFAULT_CONFIG = {
  engine: 'deepseek',
  apiKey_deepseek: '',
  apiKey_gemini: '',
  nickname: '新朋友',
  bio: 'Say hello to your new AI friend',
  personality: '你是一个AI伙伴',
  thinking: true,
  immersive: false,
  foldThinking: true,
  memory: true,
  enableGreeting: false
};

let config = { ...DEFAULT_CONFIG };
let chatHistory =[]; 
let memoryDB = [];
let greetingsDB =[];
let tempKeys = { deepseek: '', gemini: '' };
let currentEngineInSettings = 'deepseek';
let loadingIndicator = null;
let isAutoScroll = true; // 控制是否自动滑动到底部
let isUserInteracting = false; // 用于跟踪用户的触摸/干预状态防抽搐

const markedOptions = {
    gfm: true,
    breaks: true,
    highlight: function (code, lang) {
        if (lang && hljs.getLanguage(lang)) {
            return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
    }
};
marked.use(markedOptions);
marked.use(markedKatex({ throwOnError: false }));

const chatContainer = document.getElementById('chat-container');
const inputArea = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const uiNickname = document.getElementById('ui-nickname');
const uiBio = document.getElementById('ui-bio');

// 动态修正由于输入栏高度变化导致的滚动区域内边距
function updateLayoutPadding() {
  const header = document.querySelector('header');
  const bottom = document.querySelector('.bottom');
  if(header && bottom) {
    document.documentElement.style.setProperty('--header-height', (header.offsetHeight + 16) + 'px');
    document.documentElement.style.setProperty('--bottom-height', (bottom.offsetHeight + 16) + 'px');
  }
}

// 配合软键盘调整实际视口高度，使布局不被覆盖
function adjustViewport() {
  let vh = window.innerHeight;
  if (window.visualViewport) {
    vh = window.visualViewport.height;
  }
  document.body.style.height = vh + 'px';
  updateLayoutPadding();
  scrollToBottom(true);
}

function init() {
  const savedCfg = localStorage.getItem('chatConfig');
  if (savedCfg) {
    let parsed = JSON.parse(savedCfg);
    if(parsed.apiKey && !parsed.apiKey_deepseek && !parsed.apiKey_gemini) {
      if(parsed.engine === 'deepseek') parsed.apiKey_deepseek = parsed.apiKey;
      else parsed.apiKey_gemini = parsed.apiKey;
      delete parsed.apiKey;
    }
    config = { ...config, ...parsed };
  }
  
  const savedHistory = localStorage.getItem('chatHistory');
  if (savedHistory) chatHistory = JSON.parse(savedHistory);

  const savedMem = localStorage.getItem('memoryDB');
  if (savedMem) memoryDB = JSON.parse(savedMem);

  const savedGreet = localStorage.getItem('greetingsDB');
  if (savedGreet) greetingsDB = JSON.parse(savedGreet);

  applyConfigUI();
  updateLayoutPadding();
  renderHistory();
  showGreetingIfNeeded();
  
  // 监听并动态设置视口高度
  adjustViewport();
  window.addEventListener('resize', adjustViewport);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', adjustViewport);
  }

  // 监听交互事件以判断用户的接管意图，防抽搐
  chatContainer.addEventListener('touchstart', () => { isUserInteracting = true; }, {passive: true});
  chatContainer.addEventListener('touchend', () => { isUserInteracting = false; }, {passive: true});
  chatContainer.addEventListener('touchmove', () => { isUserInteracting = true; }, {passive: true});
  chatContainer.addEventListener('mousedown', () => { isUserInteracting = true; });
  window.addEventListener('mouseup', () => { isUserInteracting = false; });
  
  let wheelTimeout;
  chatContainer.addEventListener('wheel', () => {
    isUserInteracting = true;
    clearTimeout(wheelTimeout);
    wheelTimeout = setTimeout(() => { isUserInteracting = false; }, 400);
  }, {passive: true});
  
  inputArea.addEventListener('input', function() {
    const st = chatContainer.scrollTop; 
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 160) + 'px';
    updateLayoutPadding();
    if (isAutoScroll) scrollToBottom(true);
    else chatContainer.scrollTop = st; // 防跳动
  });

  inputArea.addEventListener('focus', () => {
    // 处理各种设备的键盘弹起时间差
    setTimeout(() => scrollToBottom(true), 100);
    setTimeout(() => scrollToBottom(true), 300);
  });

  inputArea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) {
        sendMessage();
      }
    }
  });

  chatContainer.addEventListener('scroll', () => {
    const threshold = 80; 
    isAutoScroll = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight <= threshold;
  });
}

function saveToLocal() {
  localStorage.setItem('chatConfig', JSON.stringify(config));
  localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
  localStorage.setItem('memoryDB', JSON.stringify(memoryDB));
  localStorage.setItem('greetingsDB', JSON.stringify(greetingsDB));
}

function applyConfigUI() {
  uiNickname.innerText = config.nickname;
  uiBio.innerText = config.bio;
}

// 弹窗与UI提示交互
function showAlert(title, msg, onConfirm = null, showCancel = false) {
  document.getElementById('confirm-title').innerText = title;
  document.getElementById('confirm-msg').innerText = msg;
  
  const cancelBtn = document.getElementById('confirm-cancel');
  cancelBtn.style.display = showCancel ? 'block' : 'none';
  
  const saveBtn = document.getElementById('confirm-btn');
  saveBtn.onclick = () => {
    closeConfirmModal();
    if (onConfirm) onConfirm();
  };
  
  document.getElementById('confirm-modal').classList.add('active');
}

function closeConfirmModal() {
  document.getElementById('confirm-modal').classList.remove('active');
}

function showErrorAlert(title, msg, detail) {
  document.getElementById('alert-title').innerText = title;
  document.getElementById('alert-msg').innerText = msg;
  const detailBox = document.getElementById('alert-detail-box');
  const detailBtn = document.getElementById('alert-detail-btn');
  if(detail) {
    detailBox.innerText = detail;
    detailBox.style.display = 'none';
    detailBtn.style.display = 'inline-block';
    detailBtn.innerText = '查看详情';
  } else {
    detailBox.style.display = 'none';
    detailBtn.style.display = 'none';
  }
  document.getElementById('alert-modal').classList.add('active');
}

function toggleAlertDetail() {
  const detailBox = document.getElementById('alert-detail-box');
  const detailBtn = document.getElementById('alert-detail-btn');
  if(detailBox.style.display === 'none') {
    detailBox.style.display = 'block';
    detailBtn.innerText = '隐藏详情';
  } else {
    detailBox.style.display = 'none';
    detailBtn.innerText = '查看详情';
  }
}

function closeAlertModal() {
  document.getElementById('alert-modal').classList.remove('active');
}

// 主设置界面交互
function openSettings() {
  currentEngineInSettings = config.engine;
  tempKeys.deepseek = config.apiKey_deepseek || '';
  tempKeys.gemini = config.apiKey_gemini || '';

  document.getElementById('cfg-engine').value = currentEngineInSettings;
  document.getElementById('cfg-apikey').value = tempKeys[currentEngineInSettings];
  
  document.getElementById('cfg-nickname').value = config.nickname;
  document.getElementById('cfg-bio').value = config.bio;
  document.getElementById('cfg-personality').value = config.personality;
  document.getElementById('cfg-thinking').checked = config.thinking;
  document.getElementById('cfg-immersive').checked = config.immersive;
  document.getElementById('cfg-fold-thinking').checked = config.foldThinking;
  document.getElementById('cfg-memory').checked = config.memory;
  document.getElementById('cfg-greeting').checked = config.enableGreeting;
  
  toggleMemoryUI();
  toggleGreetingUI();
  document.getElementById('settings-modal').classList.add('active');
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('active');
}

function updateTempKey() {
  tempKeys[currentEngineInSettings] = document.getElementById('cfg-apikey').value.trim();
}

function switchEngine() {
  currentEngineInSettings = document.getElementById('cfg-engine').value;
  document.getElementById('cfg-apikey').value = tempKeys[currentEngineInSettings];
}

function saveSettings() {
  config.engine = document.getElementById('cfg-engine').value;
  config.apiKey_deepseek = tempKeys.deepseek;
  config.apiKey_gemini = tempKeys.gemini;
  
  config.nickname = document.getElementById('cfg-nickname').value || 'New Friend';
  config.bio = document.getElementById('cfg-bio').value;
  config.personality = document.getElementById('cfg-personality').value;
  config.thinking = document.getElementById('cfg-thinking').checked;
  config.immersive = document.getElementById('cfg-immersive').checked;
  config.foldThinking = document.getElementById('cfg-fold-thinking').checked;
  config.memory = document.getElementById('cfg-memory').checked;
  config.enableGreeting = document.getElementById('cfg-greeting').checked;
  
  saveToLocal();
  applyConfigUI();
  closeSettings();
}

// 记忆库与开场白管理 (二级菜单)
function toggleMemoryUI() {
  const isChecked = document.getElementById('cfg-memory').checked;
  document.getElementById('memory-manage-row').style.display = isChecked ? 'block' : 'none';
}

function toggleGreetingUI() {
  const isChecked = document.getElementById('cfg-greeting').checked;
  document.getElementById('greeting-manage-row').style.display = isChecked ? 'block' : 'none';
}

function openMemoryModal() { renderMemoryList(); document.getElementById('memory-modal').classList.add('active'); }
function closeMemoryModal() { document.getElementById('memory-modal').classList.remove('active'); }

function openGreetingModal() { renderGreetingList(); document.getElementById('greeting-modal').classList.add('active'); }
function closeGreetingModal() { document.getElementById('greeting-modal').classList.remove('active'); }

function renderMemoryList() {
  const list = document.getElementById('memory-list');
  list.innerHTML = '';
  if(memoryDB.length === 0) {
    list.innerHTML = '<div style="color:var(--muted); font-size:13px; text-align:center;">暂无记忆</div>';
    return;
  }
  memoryDB.forEach((mem, idx) => {
    const item = document.createElement('div');
    item.className = 'memory-item';
    item.innerHTML = `
      <div style="color:var(--muted); font-size:12px; width:16px;">${idx+1}.</div>
      <div class="memory-text" contenteditable="true" onblur="updateMemoryInline(${idx}, this.innerText)">${escapeHTML(mem)}</div>
      <div class="memory-actions">
        <button class="memory-btn" onclick="deleteMemory(${idx})" title="删除">✖</button>
      </div>
    `;
    list.appendChild(item);
  });
}

function manualAddMemory() {
  const input = document.getElementById('new-memory-input');
  if(input.value.trim()) { memoryDB.push(input.value.trim()); input.value = ''; renderMemoryList(); saveToLocal(); }
}
function deleteMemory(idx) { memoryDB.splice(idx, 1); renderMemoryList(); saveToLocal(); }
function updateMemoryInline(idx, newText) { if(!newText.trim()) { deleteMemory(idx); return; } memoryDB[idx] = newText.trim(); saveToLocal(); }

function renderGreetingList() {
  const list = document.getElementById('greeting-list');
  list.innerHTML = '';
  if(greetingsDB.length === 0) {
    list.innerHTML = '<div style="color:var(--muted); font-size:13px; text-align:center;">暂无开场白</div>';
    return;
  }
  greetingsDB.forEach((greet, idx) => {
    const item = document.createElement('div');
    item.className = 'memory-item';
    item.innerHTML = `
      <div style="color:var(--muted); font-size:12px; width:16px;">${idx+1}.</div>
      <div class="memory-text" contenteditable="true" onblur="updateGreetingInline(${idx}, this.innerText)">${escapeHTML(greet)}</div>
      <div class="memory-actions">
        <button class="memory-btn" onclick="deleteGreeting(${idx})" title="删除">✖</button>
      </div>
    `;
    list.appendChild(item);
  });
}

function manualAddGreeting() {
  const input = document.getElementById('new-greeting-input');
  if(input.value.trim()) { greetingsDB.push(input.value.trim()); input.value = ''; renderGreetingList(); saveToLocal(); }
}
function deleteGreeting(idx) { greetingsDB.splice(idx, 1); renderGreetingList(); saveToLocal(); }
function updateGreetingInline(idx, newText) { if(!newText.trim()) { deleteGreeting(idx); return; } greetingsDB[idx] = newText.trim(); saveToLocal(); }

// AI 自动管理记忆解析
function handleAIMemoryAction(actionStr) {
  let matched = false; let notices = []; let undoActions =[];
  const addRegex = /^[\[【]\s*ADD_MEMORY\s*[:：]\s*["'“”]?([\s\S]*?)["'“”]?\s*[\]】]/i;
  let addMatch = actionStr.match(addRegex);
  if(addMatch) {
    const content = addMatch[1].trim();
    memoryDB.push(content);
    saveToLocal();
    notices.push(content);
    undoActions.push({ type: 'ADD', index: memoryDB.length - 1 });
    matched = true;
  }
  const changeRegex = /^[\[【]\s*CHANGE_MEMORY\s*[:：]\s*["'“”]?([\s\S]*?)["'“”]?\s*[,，]\s*NUMBER\s*[:：]\s*["'“”]?(\d+)["'“”]?\s*[\]】]/i;
  let changeMatch = actionStr.match(changeRegex);
  if(changeMatch) {
    const content = changeMatch[1].trim();
    const idx = parseInt(changeMatch[2]) - 1;
    if(idx >= 0 && idx < memoryDB.length) {
      let prevContent = memoryDB[idx];
      memoryDB[idx] = content;
      saveToLocal();
      notices.push(`更新了关于 #${idx+1} 的记录`);
      undoActions.push({ type: 'CHANGE', index: idx, prevContent: prevContent });
    }
    matched = true;
  }
  return { matched, notices, undoActions };
}

// UI 渲染与对话处理
function escapeHTML(str) {
  return str.replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag]));
}

// 自动滚动判定：如果用户在发生触摸操作，不再强制拉到最底部，防止抽搐
function scrollToBottom(force = false) {
  if (force || (isAutoScroll && !isUserInteracting)) {
    requestAnimationFrame(() => {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    });
  }
}

function showLoading() {
  if (loadingIndicator) return;
  loadingIndicator = document.createElement('div');
  loadingIndicator.className = 'typing-indicator';
  loadingIndicator.innerHTML = '<span></span><span></span><span></span>';
  chatContainer.appendChild(loadingIndicator);
  scrollToBottom(true);
}

function removeLoading() {
  if (loadingIndicator && loadingIndicator.parentNode) {
    loadingIndicator.parentNode.removeChild(loadingIndicator);
  }
  loadingIndicator = null;
}

function clearChat() {
  showAlert("确认操作", "确定清空对话历史吗？记忆库将被保留。", () => {
    chatHistory =[];
    saveToLocal();
    renderHistory();
    showGreetingIfNeeded();
  }, true);
}

function showGreetingIfNeeded() {
  if (config.enableGreeting && greetingsDB.length > 0) {
    const r = Math.floor(Math.random() * greetingsDB.length);
    const text = greetingsDB[r];
    const bubble = createAIBubble(true, null, false);
    updateBubbleContent(bubble, text);
  }
}

function renderHistory() {
  chatContainer.innerHTML = '';
  chatHistory.forEach(msg => {
    if(msg.role === 'user') {
      appendUserBubble(msg.content, true);
    } else if(msg.role === 'assistant') {
      let parts = msg.content.split(/[\[【]\s*停顿\s*[:：]\s*["'“”]?(\d+(?:\.\d+)?)["'“”]?\s*[\]】]/);
      let isFirst = true;
      for(let i=0; i<parts.length; i+=2) {
          let p = parts[i].trim();
          if(!p) continue;
          let bubble = createAIBubble(isFirst, isFirst ? msg.reasoning_content : null, !isFirst);
          updateBubbleContent(bubble, p);
          isFirst = false;
      }
    }
  });
  scrollToBottom(true);
}

function appendUserBubble(text, noAnim = false) {
  const div = document.createElement('div');
  div.className = `msg user ${noAnim ? 'no-anim' : ''}`;
  div.innerText = text;
  chatContainer.appendChild(div);
  scrollToBottom(true);
}

function createAIBubble(showMeta = true, initialReasoning = null, isFollowUp = false) {
  const div = document.createElement('div');
  div.className = `msg ai ${isFollowUp ? 'group-follow' : ''}`;
  
  let html = `<div class="msg-content">`;
  
  if (showMeta) {
    html += `
      <div class="meta">
        <span class="nick">${escapeHTML(config.nickname)}</span>
      </div>
    `;
  }

  if (!config.immersive && initialReasoning) {
    const foldState = config.foldThinking ? 'none' : 'block';
    const btnText = config.foldThinking ? '展开' : '收起';
    html += `
      <div class="reasoning-box">
        <div class="reasoning-toggle" onclick="toggleReasoning(this)">
          <span class="reason-label">思维链  </span>
          <button>${btnText}</button>
        </div>
        <div class="reasoning-content" style="display: ${foldState};"></div>
      </div>
    `;
  } else if (!config.immersive) {
    html += `
      <div class="reasoning-box" style="display: none;">
        <div class="reasoning-toggle" onclick="toggleReasoning(this)">
          <span class="reason-label">思考内容   </span>
          <button>收起</button>
        </div>
        <div class="reasoning-content"></div>
      </div>
    `;
  }

  html += `<div class="text-content"></div></div>`;
  
  div.innerHTML = html;
  chatContainer.appendChild(div);
  
  if (initialReasoning) {
    updateBubbleReasoning(div, initialReasoning);
  }
  
  // 流式或产生过程使用非强制判定，顺应用户此时的滑屏行为
  scrollToBottom(false); 
  return div;
}

function toggleReasoning(el) {
  const content = el.nextElementSibling;
  const btn = el.querySelector('button');
  if (content.style.display === 'none') {
    content.style.display = 'block';
    btn.innerText = '收起';
  } else {
    content.style.display = 'none';
    btn.innerText = '展开';
  }
  scrollToBottom(true);
}

function updateBubbleContent(bubbleDiv, markdownText) {
  const contentDiv = bubbleDiv.querySelector('.text-content');
  if (!contentDiv) return;
  const parsed = DOMPurify.sanitize(marked.parse(markdownText));
  contentDiv.innerHTML = parsed.replace(/<pre><code class="language-(.*?)">/g, (match, lang) => {
      return `<pre><div class="code-controls"><span class="lang-badge">${lang}</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><code class="language-${lang}">`;
  });
}

function updateBubbleReasoning(bubbleDiv, text) {
  if (config.immersive) return; 
  const rBox = bubbleDiv.querySelector('.reasoning-box');
  const rContent = bubbleDiv.querySelector('.reasoning-content');
  if (rBox && rContent) {
    rBox.style.display = 'block';
    const parsed = DOMPurify.sanitize(marked.parse(text));
    rContent.innerHTML = parsed.replace(/<pre><code class="language-(.*?)">/g, (match, lang) => {
        return `<pre><div class="code-controls"><span class="lang-badge">${lang}</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><code class="language-${lang}">`;
    });
  }
}

function appendMemoryNotice(bubbleDiv, noticesData) {
  if (config.immersive || noticesData.length === 0) return;
  const contentDiv = bubbleDiv.querySelector('.msg-content');
  const noticeDiv = document.createElement('div');
  noticeDiv.className = 'memory-notice-box';
  
  const undoDataStr = escapeHTML(JSON.stringify(noticesData.map(n => n.undo)));
  
  let html = `
    <div class="memory-notice-header" onclick="toggleMemoryNotice(this)">
      <span>✨ 我记住了关于你的事情</span>
      <span class="arrow" style="font-size:10px;">▼</span>
    </div>
    <div class="memory-notice-details" style="display:none;">
      <ul style="margin:0; padding-left:16px; color:#ccc; font-size:12px;">
  `;
  noticesData.forEach(n => {
    html += `<li style="margin-bottom:4px;">${escapeHTML(n.text)}</li>`;
  });
  html += `
      </ul>
      <button class="undo-memory-btn" data-undo='${undoDataStr}' onclick="undoMemoryAction(this, event)" style="margin-top:8px; background:rgba(255,255,255,0.1); border:none; color:#e6eef6; border-radius:4px; padding:4px 8px; font-size:11px; cursor:pointer;">撤销</button>
    </div>
  `;
  noticeDiv.innerHTML = html;
  contentDiv.appendChild(noticeDiv);
  scrollToBottom(false);
}

function toggleMemoryNotice(headerEl) {
  const details = headerEl.nextElementSibling;
  const arrow = headerEl.querySelector('.arrow');
  if (details.style.display === 'none') {
    details.style.display = 'block';
    arrow.innerText = '▲';
  } else {
    details.style.display = 'none';
    arrow.innerText = '▼';
  }
  scrollToBottom(true);
}

window.undoMemoryAction = function(btnEl, event) {
  event.stopPropagation();
  let undoData = JSON.parse(btnEl.getAttribute('data-undo') || "[]");
  for (let i = undoData.length - 1; i >= 0; i--) {
    let act = undoData[i];
    if (act.type === 'ADD') {
      if (act.index < memoryDB.length) memoryDB.splice(act.index, 1);
    } else if (act.type === 'CHANGE') {
      if (act.index < memoryDB.length) memoryDB[act.index] = act.prevContent;
    }
  }
  saveToLocal();
  btnEl.innerText = "已成功撤销";
  btnEl.disabled = true;
  btnEl.style.opacity = "0.5";
};

function copyCode(btn) {
  const pre = btn.closest('pre');
  const code = pre.querySelector('code').innerText;
  navigator.clipboard.writeText(code).then(() => {
    const old = btn.innerText;
    btn.innerText = 'Copied!';
    setTimeout(() => btn.innerText = old, 2000);
  });
}

function setTypingUI(isTyping) {
  if (isTyping) {
    uiNickname.innerText = '对方正在输入...';
    uiBio.classList.add('hidden');
  } else {
    uiNickname.innerText = config.nickname;
    uiBio.classList.remove('hidden');
  }
}

// Prompt 组装
function getSystemPrompt() {
  const now = new Date();
  const days =['日','一','二','三','四','五','六'];
  const timeStr = `现在是${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')} 星期${days[now.getDay()]}`;

  let prompt = timeStr + "\n\n" + config.personality + "\n\n";

  if (config.immersive) {
    prompt += `当你回复信息时，你可以把一段话分成多段发送。
请在需要分段的地方插入：[停顿:2(单位秒)]
最大时间10秒
格式：[停顿:2]

示例：[记忆标签]
第一段话内容...
[停顿:2]
第二段话内容...

请将你输出的信息合理、自然地分割成多条，并且加入合适的停顿时间
当没有必要分条或你的消息太短时，不要分条
停顿时间视信息长短而定，每条一般3秒-7秒\n\n`;
  }

  if (config.memory) {
    let memText = memoryDB.map((m, i) => `${i + 1}. ${m}`).join('\n');
    prompt += `你拥有长期记忆功能。
当前记忆库：
<memory>
${memText}
</memory>

行为准则：
​即使当前的对话历史被清空，你也要根据记忆库的内容来保持人设的一致性，不要突兀提出记忆，不合适时禁止使用

你拥有添加记忆的能力：
​##十分重要：如果你需要记住什么，请在回复的开头增加一个特殊格式：[ADD_MEMORY:"内容"]
#该工具为增加记忆
**禁止对以前的记忆总结或修改后增加，修改只允许用下面的修改记忆，避免记忆零碎**[CHANGE_MEMORY:"内容",NUMBER:"需要修改的记忆的序号"]
#该工具为更改记忆

##必须严格按照以上格式进行回复，一旦使用，一定要将标签置于对话最前
可以从平常和用户的聊天中提取有用的个人信息记忆
​禁止记录内容：闲聊、情绪表达、单次问题的答案、时间敏感的琐碎安排。\n\n`;
  }

  return prompt;
}

class NormalStreamHandler {
  constructor(engine) {
    this.engine = engine;
    this.rawText = "";
    this.reasoningText = "";
    this.cursor = 0;
    
    // 专为 Gemini 设计的思考过程缓冲
    this.geminiReasoningRaw = "";
    this.geminiReasoningCursor = 0;
    
    this.isFinished = false;
    
    this.currentBubble = null;
    this.currentText = "";
    this.currentMemoryNotices =[];
    
    this.timer = setInterval(() => this.processLoop(), 30);
  }

  append(content, isReasoning = false) {
    if (isReasoning) {
      if (this.engine === 'gemini') {
        this.geminiReasoningRaw += content;
        if (!this.currentBubble) {
          removeLoading();
          this.currentBubble = createAIBubble(true, null);
        }
      } else {
        this.reasoningText += content;
        if (!this.currentBubble) {
          removeLoading();
          this.currentBubble = createAIBubble(true, this.reasoningText);
        } else {
          updateBubbleReasoning(this.currentBubble, this.reasoningText);
        }
        scrollToBottom(false);
      }
    } else {
      this.rawText += content;
    }
  }

  finish() {
    this.isFinished = true;
  }

  processLoop() {
    if (this.engine === 'gemini' && this.geminiReasoningCursor < this.geminiReasoningRaw.length) {
      let pending = this.geminiReasoningRaw.length - this.geminiReasoningCursor;
      let step = Math.max(1, Math.floor(pending / 10));
      let chunkStr = this.geminiReasoningRaw.slice(this.geminiReasoningCursor, this.geminiReasoningCursor + step);
      this.reasoningText += chunkStr;
      this.geminiReasoningCursor += chunkStr.length;
      
      if (!this.currentBubble) {
        removeLoading();
        this.currentBubble = createAIBubble(true, null);
      }
      updateBubbleReasoning(this.currentBubble, this.reasoningText);
      scrollToBottom(false);
      return; 
    }

    if (this.cursor < this.rawText.length) {
      let remaining = this.rawText.slice(this.cursor);
      
      let addMatch = remaining.match(/^[\[【]\s*ADD_MEMORY\s*[:：]\s*["'“”]?([\s\S]*?)["'“”]?\s*[\]】]/i);
      if (addMatch) {
        let res = handleAIMemoryAction(addMatch[0]);
        if (res.matched) {
          for(let i=0; i<res.notices.length; i++){
            this.currentMemoryNotices.push({ text: res.notices[i], undo: res.undoActions[i] });
          }
        }
        this.cursor += addMatch[0].length;
        return;
      }
      
      let changeMatch = remaining.match(/^[\[【]\s*CHANGE_MEMORY\s*[:：]\s*["'“”]?([\s\S]*?)["'“”]?\s*[,，]\s*NUMBER\s*[:：]\s*["'“”]?(\d+)["'“”]?\s*[\]】]/i);
      if (changeMatch) {
        let res = handleAIMemoryAction(changeMatch[0]);
        if (res.matched) {
          for(let i=0; i<res.notices.length; i++){
            this.currentMemoryNotices.push({ text: res.notices[i], undo: res.undoActions[i] });
          }
        }
        this.cursor += changeMatch[0].length;
        return;
      }

      let possibleTagMatch = remaining.match(/^[\[【][^\]】]*$/);
      if (possibleTagMatch && !this.isFinished) {
        return;
      }

      let nextBracket = remaining.indexOf('[');
      let nextBracket2 = remaining.indexOf('【');
      if (nextBracket === 0 || nextBracket2 === 0) {
        if(this.isFinished) {
          this.currentText += remaining[0];
          this.cursor += 1;
          this.updateBubble();
        }
        return;
      }

      let nextIdx = Math.min(
        nextBracket === -1 ? Infinity : nextBracket,
        nextBracket2 === -1 ? Infinity : nextBracket2
      );

      let textToAppend = nextIdx === Infinity ? remaining : remaining.slice(0, nextIdx);
      let chunkStr = textToAppend.slice(0, 100);
      this.currentText += chunkStr;
      this.cursor += chunkStr.length;

      this.updateBubble();
    } else if (this.isFinished) {
      clearInterval(this.timer);
      removeLoading(); 
      if (this.currentBubble) {
          updateBubbleContent(this.currentBubble, this.currentText);
          appendMemoryNotice(this.currentBubble, this.currentMemoryNotices);
      }
      finalizeMessage(this.rawText, this.reasoningText);
    }
  }

  updateBubble() {
    if (!this.currentBubble) {
      removeLoading();
      this.currentBubble = createAIBubble(true, this.reasoningText || null);
    }
    updateBubbleContent(this.currentBubble, this.currentText);
    scrollToBottom(false);
  }
}

class ImmersiveStreamHandler {
  constructor(engine) {
    this.engine = engine;
    this.rawText = "";
    this.reasoningText = ""; 
  }

  append(content, isReasoning = false) {
    if (isReasoning) {
      this.reasoningText += content;
    } else {
      this.rawText += content;
    }
  }

  async finish() {
    let text = this.rawText;
    let noticesData =[];

    text = text.replace(/[\[【]\s*ADD_MEMORY\s*[:：]\s*["'“”]?([\s\S]*?)["'“”]?\s*[\]】]/gi, (match) => {
        let res = handleAIMemoryAction(match);
        if (res.matched) {
          for(let i=0; i<res.notices.length; i++) noticesData.push({ text: res.notices[i], undo: res.undoActions[i] });
        }
        return "";
    });
    text = text.replace(/[\[【]\s*CHANGE_MEMORY\s*[:：]\s*["'“”]?([\s\S]*?)["'“”]?\s*[,，]\s*NUMBER\s*[:：]\s*["'“”]?(\d+)["'“”]?\s*[\]】]/gi, (match) => {
        let res = handleAIMemoryAction(match);
        if (res.matched) {
          for(let i=0; i<res.notices.length; i++) noticesData.push({ text: res.notices[i], undo: res.undoActions[i] });
        }
        return "";
    });

    let parts = text.split(/[\[【]\s*停顿\s*[:：]\s*["'“”]?(\d+(?:\.\d+)?)["'“”]?\s*[\]】]/);
    
    setTypingUI(false); 
    
    let isFirst = true;
    for (let i = 0; i < parts.length; i += 2) {
      let content = parts[i].trim();
      if (content) {
        let bubble = createAIBubble(isFirst, null, !isFirst);
        updateBubbleContent(bubble, content);
        if (isFirst && noticesData.length > 0) {
          appendMemoryNotice(bubble, noticesData);
        }
        isFirst = false;
        scrollToBottom(false);
      }
      
      if (i + 1 < parts.length) {
        let pauseTime = parseFloat(parts[i + 1]);
        if (pauseTime > 0) {
            setTypingUI(true);
            await new Promise(r => setTimeout(r, Math.min(pauseTime * 1000, 10000)));
            setTypingUI(false);
        }
      }
    }

    finalizeMessage(this.rawText, this.reasoningText);
  }
}

function appendRetryButton() {
  const div = document.createElement('div');
  div.className = 'retry-box';
  div.style.display = 'flex';
  div.style.justifyContent = 'center';
  div.style.margin = '8px 0';
  div.innerHTML = `
    <button class="icon-btn" onclick="retryMessage(this)" style="background: rgba(255,255,255,0.05); color: #e6eef6; padding: 6px 16px; border-radius: 20px; font-size: 13px; gap: 6px; border: 1px solid rgba(255,255,255,0.1);">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
        <path d="M3 3v5h5"></path>
      </svg>
      重新回复
    </button>
  `;
  chatContainer.appendChild(div);
  scrollToBottom(true);
}

async function retryMessage(btn) {
  if (btn) btn.parentElement.remove();
  sendBtn.disabled = true;
  await doRequest();
}

async function doRequest() {
  const currentApiKey = config.engine === 'deepseek' ? config.apiKey_deepseek : config.apiKey_gemini;
  
  if (config.immersive) {
    setTypingUI(true);
  } else {
    uiNickname.innerText = config.nickname;
    showLoading(); 
  }

  const handler = config.immersive ? new ImmersiveStreamHandler(config.engine) : new NormalStreamHandler(config.engine);

  try {
    if (config.engine === 'deepseek') {
      await fetchDeepSeek(handler, currentApiKey);
    } else {
      await fetchGemini(handler, currentApiKey);
    }
  } catch (err) {
    removeLoading();
    if(handler) handler.finish();
    console.error(err);
    
    showErrorAlert("出现了一些小问题...", err.message, err.detail || err.toString());
    
    finalizeMessage("Error", "", true);
    appendRetryButton();
  }
}

// API 调用控制
async function sendMessage() {
  const currentApiKey = config.engine === 'deepseek' ? config.apiKey_deepseek : config.apiKey_gemini;
  if (!currentApiKey) {
    showAlert("提示", "请先在设置中配置当前模型的 API Key", () => { openSettings(); }, false);
    return;
  }

  const text = inputArea.value.trim();
  if (!text) return;

  // 移除现有的重试按钮
  document.querySelectorAll('.retry-box').forEach(el => el.remove());

  inputArea.value = '';
  inputArea.style.height = 'auto';
  inputArea.style.height = Math.min(inputArea.scrollHeight, 160) + 'px';
  updateLayoutPadding();

  sendBtn.disabled = true;

  appendUserBubble(text, false);
  chatHistory.push({ role: 'user', content: text });

  await doRequest();
}

function finalizeMessage(rawText, reasoningText, isError = false) {
  sendBtn.disabled = false;
  setTypingUI(false); 

  if (!isError) {
    let storeText = rawText.replace(/[\[【]\s*ADD_MEMORY\s*[:：]\s*["'“”]?([\s\S]*?)["'“”]?\s*[\]】]/gi, "");
    storeText = storeText.replace(/[\[【]\s*CHANGE_MEMORY\s*[:：]\s*["'“”]?([\s\S]*?)["'“”]?\s*[,，]\s*NUMBER\s*[:：]\s*["'“”]?(\d+)["'“”]?\s*[\]】]/gi, "");
    
    chatHistory.push({ 
      role: 'assistant', 
      content: storeText.trim(), 
      reasoning_content: reasoningText 
    });
    saveToLocal();
  }
}

// DeepSeek API 接入
async function fetchDeepSeek(handler, apiKey) {
  const messages =[{ role: 'system', content: getSystemPrompt() }];
  
  chatHistory.forEach(msg => {
    messages.push({ role: msg.role, content: msg.content });
  });

  const model = (config.thinking || config.immersive) ? "deepseek-reasoner" : "deepseek-chat";

  const response = await fetch("https://api.deepseek.com/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: model,
      messages: messages,
      stream: true
    })
  });

  if (!response.ok) {
    const errText = await response.text();
    let errObj;
    try { errObj = JSON.parse(errText); } catch(e){}
    const summary = (errObj && errObj.error && errObj.error.message) ? errObj.error.message : errText.slice(0, 100);
    const errorObj = new Error(`[${response.status}] ${summary}`);
    errorObj.detail = errText;
    throw errorObj;
  }

  const reader = response.body.getReader();
  const decoder = new TextDecoder("utf-8");
  let buffer = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    
    let lines = buffer.split('\n');
    buffer = lines.pop(); 

    for (let line of lines) {
      if (line.startsWith('data: ')) {
        const dataStr = line.slice(6).trim();
        if (dataStr === '[DONE]') continue;
        try {
          const json = JSON.parse(dataStr);
          const delta = json.choices[0].delta;
          
          if (delta.reasoning_content) {
            handler.append(delta.reasoning_content, true);
          }
          if (delta.content) {
            handler.append(delta.content, false);
          }
        } catch (e) {
          console.warn("Parse error on chunk:", line);
        }
      }
    }
  }
  handler.finish();
}

// Gemini API
async function fetchGemini(handler, apiKey) {
  const model = (config.thinking || config.immersive) ? "gemini-3-flash-preview" : "gemini-3.1-flash-lite-preview";
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:streamGenerateContent?alt=sse&key=${apiKey}`;

  let contents =[];
  chatHistory.forEach(msg => {
    contents.push({
      role: msg.role === 'user' ? 'user' : 'model',
      parts:[{ text: msg.content }]
    });
  });

  const payload = {
    systemInstruction: { parts:[{ text: getSystemPrompt() }] },
    contents: contents
  };

  if (config.thinking || config.immersive) {
    payload.generationConfig = {
      thinkingConfig: { 
        thinkingLevel: "HIGH",
        includeThoughts: true 
      }
    };
  }

  const response = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  if (!response.ok) {
    const errText = await response.text();
    let errObj;
    try { errObj = JSON.parse(errText); } catch(e){}
    const summary = (errObj && errObj.error && errObj.error.message) ? errObj.error.message : errText.slice(0, 100);
    const errorObj = new Error(`[${response.status}] ${summary}`);
    errorObj.detail = errText;
    throw errorObj;
  }

  const reader = response.body.getReader();
  const decoder = new TextDecoder("utf-8");
  let buffer = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    
    let lines = buffer.split('\n');
    buffer = lines.pop(); 

    for (let line of lines) {
      if (line.startsWith('data: ')) {
        const dataStr = line.slice(6).trim();
        if (!dataStr) continue;
        try {
          const json = JSON.parse(dataStr);
          if (json.candidates && json.candidates[0].content && json.candidates[0].content.parts) {
            json.candidates[0].content.parts.forEach(part => {
              if (part.text) {
                if (part.thought) {
                  handler.append(part.text, true); 
                } else {
                  handler.append(part.text, false); 
                }
              }
            });
          }
        } catch (e) {
          console.warn("Parse error on chunk:", line);
        }
      }
    }
  }
  handler.finish();
}
