<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>DeepSeek Chat by 风扇</title>

<!-- highlight.js for client-side syntax highlighting -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<!-- KaTeX for math rendering -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

<style>
  :root{
    --bg:#0F1113;
    --panel:#191B1E;
    --muted:#8b949e;
    --bubble:#242628;
    --accent:#0066CC;
    --radius:14px;
    --safe-bottom: env(safe-area-inset-bottom, 12px);
    --bottom-height: 76px;
  }
  html,body{height:100%;margin:0;background:var(--bg);color:#e6eef6;font-family: Inter, "Helvetica Neue", Arial, sans-serif;-webkit-font-smoothing:antialiased}
  .app{display:flex;flex-direction:column;min-height:100vh;gap:0}
  header{padding:14px 12px;background:var(--panel);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center}
  .ai-box{display:flex;flex-direction:column}
  .ai-title{font-weight:600;font-size:16px;letter-spacing:0.2px;display:flex;align-items:center;}
  .signature{font-size:12px;color:var(--muted);margin-top:4px}
  main{flex:1;overflow:auto;padding:16px;padding-bottom:calc(var(--bottom-height) + var(--safe-bottom));display:flex;flex-direction:column;gap:12px}
  .messages{display:flex;flex-direction:column;gap:12px;align-items:stretch}
  .msg{max-width:78%;padding:10px 12px;border-radius:12px;font-size:15px;line-height:1.45;word-break:break-word;white-space:pre-wrap;background:var(--bubble)}
  .msg.user{margin-left:auto;text-align:left}
  .msg.ai{margin-right:auto;text-align:left;position: relative;}
  
  .meta{font-size:12px;color:var(--muted);margin-bottom:6px;display:flex;flex-direction:column;align-items:flex-start;gap:4px}
  .nick{font-weight:700;color:#fff;display:flex;align-items:center}
  .typing-dots{display:inline-flex;gap:6px;margin-top:2px}
  .typing-dots span{width:6px;height:6px;background:var(--muted);border-radius:50%;display:inline-block;animation:blink 1.4s infinite}
  .typing-dots span:nth-child(2){animation-delay:0.2s}
  .typing-dots span:nth-child(3){animation-delay:0.4s}
  @keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
  
  .messages-spacer{height:var(--bottom-height);flex-shrink:0}
  .bottom{position:fixed;left:0;right:0;padding:12px 12px calc(12px + var(--safe-bottom));backdrop-filter: blur(6px);background:var(--panel);border-top:1px solid rgba(255,255,255,0.05);z-index:8;transition:bottom 160ms ease}
  .composer{display:flex;gap:8px;align-items:center}
  textarea#input{flex:1;min-height:44px;max-height:240px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:#1a1c1e;padding:12px 14px;color:#e6eef6;resize:none;font-size:15px;overflow-y:auto;line-height:1.4;transition:width 160ms ease,height 160ms ease,padding 160ms ease}
  .send-btn{background:var(--accent);color:white;padding:10px 12px;border-radius:12px;border:none;font-weight:600;cursor:pointer}
  .settings-btn,.clear-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;margin-left:8px}

  /* Modal */
  .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:none;justify-content:center;align-items:center;z-index:10}
  .modal-content{background:var(--panel);padding:18px;border-radius:var(--radius);width:92%;max-width:520px;box-shadow:0 0 10px rgba(0,0,0,0.4);display:flex;flex-direction:column;gap:6px}
  .modal-content h2{margin:0 0 8px 0;font-size:18px}
  .modal-row{display:flex;flex-direction:column;gap:6px;}
  .modal-content label{color:var(--muted);font-size:13px}
  .modal-content input[type="text"], .modal-content input[type="search"], .modal-content input[type="password"]{
    width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:#0F1113;color:#e6eef6;outline:none;box-sizing:border-box;
  }
  .modal-content textarea{width:100%;min-height:120px;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:#0F1113;color:#e6eef6;outline:none;box-sizing:border-box;resize:vertical}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
  .btn{padding:8px 12px;border:none;border-radius:8px;cursor:pointer;font-weight:600}
  .btn.save{Background:var(--accent);color:#fff}
  .btn.danger{background:#d32f2f;color:#fff}
  .btn.close{background:#333;color:#ccc}
  /* 超链接样式的按钮 */
  .link-btn {
      background: none; border: none; color: var(--accent);
      text-decoration: underline; cursor: pointer; font-size: 13px; 
      padding: 0; align-self: flex-start; margin-top: 4px;
  }

  main, .messages {scroll-behavior: smooth;}

  /* Markdown & Code */
  .msg pre {
    background: #0b0c0d; border-radius:8px; padding:12px; margin:6px 0; overflow:auto;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Helvetica Neue", monospace;
    font-size:13px; line-height:1.45; border:1px solid rgba(255,255,255,0.04);
    white-space:pre; word-break:normal; position:relative;
  }
  .msg code.inline {
    background: rgba(255,255,255,0.03); padding:2px 6px; border-radius:6px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Helvetica Neue", monospace;
    font-size:13px;
  }
  .msg h1, .msg h2, .msg h3, .msg h4 { margin:8px 0 6px; color:#fff; }
  .msg p{margin:6px 0}
  .msg ul, .msg ol{margin:6px 0 8px 18px;padding:0}
  .msg li{margin:6px 0}
  .msg blockquote{
    margin:6px 0;padding:8px 12px;border-left:3px solid rgba(255,255,255,0.06);
    color:var(--muted);background:rgba(255,255,255,0.02);border-radius:8px;
  }
  .msg a{color:var(--accent);text-decoration:none}
  .code-controls { position:absolute; top:8px; right:8px; display:flex; gap:6px; align-items:center; z-index:5; }
  .copy-btn { background: rgba(255,255,255,0.06); color: #e6eef6; border: none; padding:6px 8px; border-radius:8px; font-size:12px; cursor:pointer; backdrop-filter: blur(4px); }
  .lang-badge { background: rgba(255,255,255,0.03); color: var(--muted); padding:4px 6px; border-radius:8px; font-size:11px; }

  @media (max-height:600px){ .modal-content{max-height:80vh;overflow:auto} }

  /* Reasoning */
  .reasoning-box {
    margin-top:8px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.03);
    padding:10px; border-radius:10px; color:var(--muted); font-size:13px; line-height:1.45;
  }
  .reasoning-toggle { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-top:8px; }
  .reasoning-toggle button { background: transparent; color: var(--muted); border:1px solid rgba(255,255,255,0.04); padding:6px 8px; border-radius:8px; cursor:pointer; font-size:12px; }
  .reason-label { font-size:12px;color:var(--muted); }
  textarea.collapsed { width: 160px; padding-top:8px; padding-bottom:8px; height:44px; }
  textarea.expanded { width: auto; flex:1; }
  @media (max-width:420px){ textarea.collapsed { width: 120px; } }
  .toggle-row{display:flex;align-items:center;gap:10px;}
  .toggle-desc{color:var(--muted);font-size:13px}

  /* Memory Manager */
  .memory-list {
    display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto;
    border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 8px; background: #151719;
  }
  .memory-item { display: flex; gap: 6px; background: rgba(255,255,255,0.03); padding: 6px; border-radius: 6px; align-items: center; }
  .memory-index { color: var(--muted); font-size: 11px; min-width: 20px; }
  .memory-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; }
  .memory-btn:hover { color: #d32f2f; }
  
  /* Message-Inline Memory Notice (New) */
  .memory-notice-box {
    margin-top: 10px;
    background: rgba(40, 60, 80, 0.4);
    border: 1px solid rgba(0, 102, 204, 0.3);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px;
    color: #e6eef6;
  }
  .memory-notice-header {
    display: flex; justify-content: space-between; align-items: center; font-weight: 600; color: #8cb4ff;
  }
  .memory-notice-btn {
    background: none; border: none; color: var(--muted); cursor: pointer; font-size: 11px; padding: 2px 6px;
  }
  .memory-notice-btn:hover { color: #fff; text-decoration: underline; }
  .memory-notice-content {
    margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.1);
    display: none; /* Default hidden */
  }
  .memory-log-line { margin-bottom: 4px; color: #ccc; }
  .memory-undo-btn {
    margin-top: 6px; background: rgba(255,255,255,0.1); border: none; color: #fff;
    padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  .memory-undo-btn:hover { background: rgba(255,255,255,0.2); }
  .memory-restored-text { color: var(--muted); font-style: italic; margin-top: 4px; }

</style>
</head>
<body>
<div class="app">
  <header>
    <div class="ai-box">

<!-- 清空历史确认弹窗 -->
<div class="modal" id="confirmModal">

        </div>

    <div class="modal-row">

<!-- 设置弹窗 -->
<div class="modal" id="settingsModal">
  <div class="modal-content">
    <h2>设置</h2>
    <div class="modal-row">
      <label for="aiNick">昵称 Name</label>
      <input id="aiNick" type="text" value="小风" />

    <div class="modal-row">

    <div class="modal-row">

<script>

const API_BASE = "https://api.deepseek.com";
const MODEL_CHAT = "deepseek-chat";
const MODEL_REASONER = "deepseek-reasoner";
const STORAGE_KEY = "deepseek_chat_autosave";
const SETTINGS_KEY = "deepseek_chat_settings";
const MEMORY_KEY = "deepseek_chat_memory";

const msgsEl = document.getElementById("messages");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("send");
const aiNickEl = document.getElementById("aiNick");
const aiTitleTextEl = document.getElementById("aiTitleText");
const signatureEl = document.getElementById("signature");
const signatureInputEl = document.getElementById("signatureInput");
const userPromptEl = document.getElementById("userPrompt");
const apiKeyEl = document.getElementById("apiKeyInput");
const reasoningToggleEl = document.getElementById("reasoningToggle");
const defaultReasonCollapsedToggleEl = document.getElementById("defaultReasonCollapsedToggle");
const memoryToggleEl = document.getElementById("memoryToggle");
const immersiveToggleEl = document.getElementById("immersiveToggle");

// Modals
const settingsModal = document.getElementById("settingsModal");
const openSettingsBtn = document.getElementById("openSettings");
const closeSettingsBtn = document.getElementById("closeSettings");
const saveSettingsBtn = document.getElementById("saveSettings");
const clearHistoryBtn = document.getElementById("clearHistory");

const confirmModal = document.getElementById("confirmModal");
const confirmClearBtn = document.getElementById("confirmClear");
const cancelClearBtn = document.getElementById("cancelClear");

const memoryModal = document.getElementById("memoryModal");
const openMemoryManagerBtn = document.getElementById("openMemoryManager");
const closeMemoryModalBtn = document.getElementById("closeMemoryModal");
const saveMemoryModalBtn = document.getElementById("saveMemoryModal");
const memoryListContainer = document.getElementById("memoryListContainer");
const manualMemoryInput = document.getElementById("manualMemoryInput");

const bottomEl = document.getElementById("bottom");

let messages = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
let memories = JSON.parse(localStorage.getItem(MEMORY_KEY) || "[]");

/* ------------------ Markdown helpers ------------------ */
function escapeHtml(str){
  return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function extractCodeBlocksRaw(text){
  const codeBlocks = [];
  let out = "";
  let pos = 0;
  while(true){
    const start = text.indexOf("```", pos);
    if(start === -1){
      out += text.slice(pos);
      break;
    }
    out += text.slice(pos, start);
    const end = text.indexOf("```", start + 3);
    const between = (end === -1) ? text.slice(start + 3) : text.slice(start + 3, end);
    const m = between.match(/^([^\n]*)\n([\s\S]*)$/);
    let lang = "", code = "";
    if(m){ lang = m[1].trim(); code = m[2]; } else { lang = ""; code = between; }
    const idx = codeBlocks.length;
    codeBlocks.push({lang, code});
    out += `@@CODEBLOCK_${idx}@@`;
    if(end === -1){ pos = text.length; break; } else { pos = end + 3; continue; }
  }
  return {text: out, codeBlocks};
}

function markdownToHtml(input){
  if(input === null || input === undefined) return "";
  let text = String(input).replace(/\r\n/g, "\n");
  const extracted = extractCodeBlocksRaw(text);
  text = extracted.text;
  const codeBlocks = extracted.codeBlocks;
  const lines = text.split("\n");
  const outParts = [];
  let paragraph = null;
  let inUl = false, inOl = false;

  function flushParagraph(){
    if(paragraph !== null){ outParts.push(`<p>${paragraph}</p>`); paragraph = null; }
  }

  for(let i = 0; i < lines.length; i++){
    let line = lines[i];
    const headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
    if(headingMatch){
      flushParagraph();
      if(inUl){ outParts.push("</ul>"); inUl = false; }
      if(inOl){ outParts.push("</ol>"); inOl = false; }
      const level = headingMatch[1].length;
      outParts.push(`<h${level}>${inlineFormatting(escapeHtml(headingMatch[2]))}</h${level}>`);
      continue;
    }
    if(line.indexOf('|') !== -1 && i + 1 < lines.length){
      const sepLine = lines[i+1];
      if(sepLine.match(/^\s*\|?\s*(:?-+:?\s*)(\|\s*:?-+:?\s*)+\|?\s*$/)){
        flushParagraph();
        if(inUl){ outParts.push("</ul>"); inUl = false; }
        if(inOl){ outParts.push("</ol>"); inOl = false; }
        function splitRow(row){
          const parts = row.split('|').map(s => s.trim());
          if(parts.length>0&&parts[0]==="") parts.shift();
          if(parts.length>0&&parts[parts.length-1]==="") parts.pop();
          return parts;
        }
        const headerCells = splitRow(line);
        const bodyRows = [];
        let j = i + 2;
        for(; j < lines.length; j++){
          const r = lines[j]; if(r.trim() === "" || r.indexOf('|') === -1) break;
          bodyRows.push(splitRow(r));
        }
        let tableHtml = "<table><thead><tr>";
        for(const hc of headerCells) tableHtml += `<th>${inlineFormatting(escapeHtml(hc))}</th>`;
        tableHtml += "</tr></thead>";
        if(bodyRows.length){
          tableHtml += "<tbody>";
          for(const brow of bodyRows){
            tableHtml += "<tr>";
            for(const cell of brow) tableHtml += `<td>${inlineFormatting(escapeHtml(cell))}</td>`;
            tableHtml += "</tr>";
          }
          tableHtml += "</tbody>";
        }
        tableHtml += "</table>";
        outParts.push(tableHtml);
        i = j - 1;
        continue;
      }
    }
    if(line.trim().startsWith(">")){
      flushParagraph();
      if(inUl){ outParts.push("</ul>"); inUl = false; }
      if(inOl){ outParts.push("</ol>"); inOl = false; }
      outParts.push(`<blockquote>${inlineFormatting(escapeHtml(line.replace(/^\s*>\s?/, "")))}</blockquote>`);
      continue;
    }
    const ulMatch = line.match(/^\s*[-*+]\s+(.*)$/);
    if(ulMatch){
      flushParagraph();
      if(inOl){ outParts.push("</ol>"); inOl = false; }
      if(!inUl){ outParts.push("<ul>"); inUl = true; }
      outParts.push(`<li>${inlineFormatting(escapeHtml(ulMatch[1]))}</li>`);
      continue;
    } else if(inUl && line.trim() === ""){ outParts.push("</ul>"); inUl = false; continue; }
    const olMatch = line.match(/^\s*\d+\.\s+(.*)$/);
    if(olMatch){
      flushParagraph();
      if(inUl){ outParts.push("</ul>"); inUl = false; }
      if(!inOl){ outParts.push("<ol>"); inOl = true; }
      outParts.push(`<li>${inlineFormatting(escapeHtml(olMatch[1]))}</li>`);
      continue;
    } else if(inOl && line.trim() === ""){ outParts.push("</ol>"); inOl = false; continue; }

    if(line.trim() === ""){ flushParagraph(); continue; }
    const formatted = inlineFormatting(escapeHtml(line.trim()));
    paragraph = (paragraph === null) ? formatted : paragraph + " " + formatted;
  }
  flushParagraph();
  if(inUl) outParts.push("</ul>");
  if(inOl) outParts.push("</ol>");
  let html = outParts.join("\n");
  html = html.replace(/@@CODEBLOCK_(\d+)@@/g, (m, idx) => {
    const cb = codeBlocks[Number(idx)]; if(!cb) return "";
    const langClass = cb.lang ? ` class="language-${escapeHtml(cb.lang)}"` : "";
    return `<pre><code${langClass}>${escapeHtml(cb.code)}</code></pre>`;
  });
  return html;
}

function inlineFormatting(escapedText){
  if(!escapedText) return "";
  const codePlaceholders = [];
  escapedText = escapedText.replace(/`([^`]+)`/g, (m, code) => {
    codePlaceholders.push(code); return `@@INLINECODE_${codePlaceholders.length-1}@@`;
  });
  escapedText = escapedText.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, t, u) => `<a href="${(/^(https?:\/\/|mailto:)/i.test(u)?escapeHtml(u):"#")}" target="_blank">${t}</a>`);
  escapedText = escapedText.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>").replace(/(^|[^*])\*([^*]+)\*([^*]|$)/g, "$1<em>$2</em>$3");
  escapedText = escapedText.replace(/@@INLINECODE_(\d+)@@/g, (m, idx) => `<code class="inline">${codePlaceholders[Number(idx)]}</code>`);
  return escapedText;
}

/* ------------------ 渲染消息 ------------------ */
function renderMessages() {
  const isImmersive = isImmersiveMode();
  msgsEl.innerHTML = "";
  for (const m of messages) {
    if(m.role==="system") continue;
    const el = document.createElement("div");
    el.className = "msg " + (m.role === "user" ? "user" : "ai");

    if(m.role === "assistant") {
      const meta = document.createElement("div");
      meta.className = "meta";
      const nickWrap = document.createElement("div");
      nickWrap.className = "nick";
      nickWrap.innerHTML = `<span>${escapeHtml(aiNickEl.value || "AI")}</span>`;
      meta.appendChild(nickWrap);

      if(m.content==="_typing"){
        const dots = document.createElement("div");
        dots.className = "typing-dots";
        dots.innerHTML = "<span></span><span></span><span></span>";
        meta.appendChild(dots);
        el.appendChild(meta);
        msgsEl.appendChild(el);
        continue;
      }
      el.appendChild(meta);
    }

    const content = document.createElement("div");
    if (m.role === "user") {
      content.textContent = m.content;
      el.appendChild(content);
    } else {
      content.innerHTML = markdownToHtml(m.content || "");
      el.appendChild(content);

      if(window.renderMathInElement){
        try{ renderMathInElement(content, { delimiters: [{left: "\\(", right: "\\)", display: false},{left: "\\[", right: "\\]", display: true}], throwOnError: false }); }catch(e){}
      }

      // 渲染思维链 (沉浸模式下不渲染)
      if(m.reasoning && !isImmersive){
        const toggleWrap = document.createElement("div");
        toggleWrap.className = "reasoning-toggle";
        toggleWrap.innerHTML = `<div class="reason-label">深度思考 Reasoning</div><button type="button">${m.reasonCollapsed ? "展开思维链" : "收起思考链"}</button>`;
        toggleWrap.querySelector("button").addEventListener("click", ()=>{
          m.reasonCollapsed = !m.reasonCollapsed;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
          renderMessages();
        });
        el.appendChild(toggleWrap);
        const rbox = document.createElement("div");
        rbox.className = "reasoning-box";
        rbox.style.display = m.reasonCollapsed ? "none" : "";
        rbox.innerHTML = markdownToHtml(m.reasoning || "");
        if(!m.reasonCollapsed && window.renderMathInElement){
           try{ renderMathInElement(rbox, { delimiters: [{left: "\\(", right: "\\)", display: false},{left: "\\[", right: "\\]", display: true}], throwOnError: false }); }catch(e){}
        }
        el.appendChild(rbox);
      }

      // 渲染记忆更新提示 (沉浸模式下不渲染)
      if(m.memoryInfo && m.memoryInfo.logs && m.memoryInfo.logs.length > 0 && !m.memoryInfo.reverted && !isImmersive){
         const memBox = document.createElement("div");
         memBox.className = "memory-notice-box";
         
         const header = document.createElement("div");
         header.className = "memory-notice-header";
         header.innerHTML = `<span>✨ 我记住了关于你的事情</span><button class="memory-notice-btn">展开详情</button>`;
         
         const details = document.createElement("div");
         details.className = "memory-notice-content";
         m.memoryInfo.logs.forEach(log => {
             const line = document.createElement("div");
             line.className = "memory-log-line";
             line.textContent = "• " + log;
             details.appendChild(line);
         });

         const undoBtn = document.createElement("button");
         undoBtn.className = "memory-undo-btn";
         undoBtn.textContent = "撤销";
         undoBtn.addEventListener("click", () => {
             if(m.memoryInfo.backup !== null){
                 memories = [...m.memoryInfo.backup];
                 saveMemoriesToStorage();
                 m.memoryInfo.reverted = true; 
                 localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
                 renderMessages();
                 alert("遗忘不是终点...");
             }
         });
         details.appendChild(undoBtn);

         header.querySelector("button").addEventListener("click", (e) => {
             const isHidden = details.style.display === "none" || details.style.display === "";
             details.style.display = isHidden ? "block" : "none";
             e.target.textContent = isHidden ? "收起详情" : "展开详情";
         });

         memBox.appendChild(header);
         memBox.appendChild(details);
         el.appendChild(memBox);
      } else if (m.memoryInfo && m.memoryInfo.reverted && !isImmersive) {
          const restoredMsg = document.createElement("div");
          restoredMsg.className = "memory-notice-box";
          restoredMsg.innerHTML = `<div class="memory-restored-text">已撤销</div>`;
          el.appendChild(restoredMsg);
      }
    }
    msgsEl.appendChild(el);
  }

  const spacer = document.createElement("div");
  spacer.className = "messages-spacer";
  msgsEl.appendChild(spacer);
  const container = msgsEl.parentElement;
  container.scrollTop = container.scrollHeight;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
  enhanceCodeBlocks();
}

function enhanceCodeBlocks(){
  msgsEl.querySelectorAll("pre").forEach(pre => {
    if(pre.dataset.enhanced === "1") return;
    pre.dataset.enhanced = "1";
    const codeEl = pre.querySelector("code");
    if(!codeEl) return;
    let langLabel = "";
    const classList = Array.from(codeEl.classList || []);
    const langCls = classList.find(c => /^language-/.test(c) || /^hljs-/.test(c));
    if(langCls) langLabel = langCls.replace(/^language-/, "").replace(/^hljs-/, "");
    else try { const detected = hljs.highlightAuto(codeEl.textContent || ""); if(detected?.language) langLabel = detected.language; } catch(e){}

    const controls = document.createElement("div");
    controls.className = "code-controls";
    if(langLabel){
      const lb = document.createElement("div");
      lb.className = "lang-badge";
      lb.textContent = langLabel;
      controls.appendChild(lb);
    }
    const copyBtn = document.createElement("button");
    copyBtn.className = "copy-btn";
    copyBtn.textContent = "Copy";
    copyBtn.onclick = async () => {
      try{ await navigator.clipboard.writeText(codeEl.textContent||""); copyBtn.textContent="已复制"; setTimeout(()=>copyBtn.textContent="Copy",1200); }
      catch(e){ alert("复制失败"); }
    };
    controls.appendChild(copyBtn);
    pre.appendChild(controls);
    try{ hljs.highlightElement(codeEl); }catch(e){}
  });
}

function addMessage(role, content, extra = {}) {
  const msg = Object.assign({role, content}, extra);
  if(!msg.id) msg.id = `m_${Date.now()}_${Math.floor(Math.random()*1000)}`;
  if(msg.role === "assistant" && typeof msg.reasonCollapsed === "undefined"){
    msg.reasonCollapsed = (isReasoningEnabled() && isDefaultReasonCollapsed());
  }
  messages.push(msg);
  renderMessages();
}

function getBeijingTime(){
  const now = new Date();
  const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
  return new Date(utc + 8*3600*1000).toLocaleString("zh-CN", {hour12:false});
}

function loadSettings(){
  const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}");
  if(s.aiNick) aiNickEl.value = s.aiNick;
  if(s.signature) signatureInputEl.value = s.signature;
  if(s.userPrompt) userPromptEl.value = s.userPrompt;
  if(s.apiKey) apiKeyEl.value = s.apiKey;
  if(typeof s.reasoningEnabled !== "undefined") reasoningToggleEl.checked = !!s.reasoningEnabled;
  if(typeof s.defaultReasonCollapsed !== "undefined") defaultReasonCollapsedToggleEl.checked = !!s.defaultReasonCollapsed;
  if(typeof s.memoryEnabled !== "undefined") memoryToggleEl.checked = !!s.memoryEnabled;
  if(typeof s.immersiveMode !== "undefined") immersiveToggleEl.checked = !!s.immersiveMode;
  headerTitleUpdate();
}

function saveSettings(){
  const settings = {
    aiNick: aiNickEl.value,
    signature: signatureInputEl.value,
    userPrompt: userPromptEl.value,
    apiKey: apiKeyEl.value,
    reasoningEnabled: reasoningToggleEl.checked,
    defaultReasonCollapsed: defaultReasonCollapsedToggleEl.checked,
    memoryEnabled: memoryToggleEl.checked,
    immersiveMode: immersiveToggleEl.checked
  };
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  headerTitleUpdate();
}

function getApiKey(){ return JSON.parse(localStorage.getItem(SETTINGS_KEY)||"{}").apiKey || ""; }
function isReasoningEnabled(){ return !!JSON.parse(localStorage.getItem(SETTINGS_KEY)||"{}").reasoningEnabled; }
function isDefaultReasonCollapsed(){ return !!JSON.parse(localStorage.getItem(SETTINGS_KEY)||"{}").defaultReasonCollapsed; }
function isMemoryEnabled(){ return !!JSON.parse(localStorage.getItem(SETTINGS_KEY)||"{}").memoryEnabled; }
function isImmersiveMode(){ return !!JSON.parse(localStorage.getItem(SETTINGS_KEY)||"{}").immersiveMode; }

function headerTitleUpdate(){
  aiTitleTextEl.textContent = aiNickEl.value || "AI 聊天";
  signatureEl.textContent = signatureInputEl.value || "";
}

/* ============ 记忆管理功能 ============ */
function renderMemoryList(){
  memoryListContainer.innerHTML = "";
  if(memories.length === 0){
    const empty = document.createElement("div");
    empty.style.color = "#8b949e"; empty.style.textAlign = "center"; empty.style.padding = "10px"; empty.style.fontSize = "13px";
    empty.textContent = "暂无记忆";
    memoryListContainer.appendChild(empty);
    return;
  }
  memories.forEach((mem, index) => {
    const item = document.createElement("div");
    item.className = "memory-item";
    const idx = document.createElement("span");
    idx.className = "memory-index";
    idx.textContent = (index + 1) + ".";
    const input = document.createElement("input");
    input.type = "text";
    input.value = mem;
    input.style.flex="1"; input.style.background="transparent"; input.style.border="none"; input.style.color="#ddd"; input.style.fontSize="13px"; input.style.outline="none";
    input.addEventListener("change", (e)=>{ memories[index] = e.target.value; });
    const delBtn = document.createElement("button");
    delBtn.className = "memory-btn";
    delBtn.innerHTML = "×";
    delBtn.onclick = () => { memories.splice(index, 1); renderMemoryList(); };
    item.appendChild(idx); item.appendChild(input); item.appendChild(delBtn);
    memoryListContainer.appendChild(item);
  });
}
function saveMemoriesToStorage(){ localStorage.setItem(MEMORY_KEY, JSON.stringify(memories)); }

openMemoryManagerBtn.addEventListener("click", () => {
  renderMemoryList();
  settingsModal.style.display = "none";
  memoryModal.style.display = "flex";
});
closeMemoryModalBtn.addEventListener("click", () => {
  memoryModal.style.display = "none";
  settingsModal.style.display = "flex";
});
saveMemoryModalBtn.addEventListener("click", () => {
  saveMemoriesToStorage();
  memoryModal.style.display = "none";
});

manualMemoryInput.addEventListener("keydown", (e) => {
  if(e.key === "Enter" && manualMemoryInput.value.trim()){
    memories.push(manualMemoryInput.value.trim());
    saveMemoriesToStorage(); 
    manualMemoryInput.value = "";
    renderMemoryList();
  }
});

/* ============ 记忆解析器 ============ */
function executeMemoryTags(text) {
  const updateRegex = /\[UPDATE_MEMORY:"(.*?)"\]/g;
  const setDateRegex = /\[SETDATE_MEMORY:"(.*?)",\s*number:"(\d+)"\]/g;
  
  let newText = text;
  let logs = [];
  let hasUpdate = false;
  
  const backup = [...memories];

  let match;
  while ((match = updateRegex.exec(text)) !== null) {
      const content = match[1];
      memories.push(content);
      logs.push(`新增: ${content}`);
      hasUpdate = true;
  }
  while ((match = setDateRegex.exec(text)) !== null) {
      const content = match[1];
      const num = parseInt(match[2]);
      if (!isNaN(num) && num > 0 && num <= memories.length) {
          const old = memories[num - 1];
          memories[num - 1] = content;
          logs.push(`修改 #${num}: ${old} -> ${content}`);
          hasUpdate = true;
      }
  }
  
  newText = newText.replace(updateRegex, "");
  newText = newText.replace(setDateRegex, "");
  
  if (hasUpdate) {
      saveMemoriesToStorage();
  }
  
  return {
      cleanedText: newText,
      logs: logs,
      backup: backup,
      hasUpdate: hasUpdate
  };
}

async function sendMessage(){
  const text = inputEl.value.trim();
  if(!text) return;
  inputEl.value = "";
  inputEl.style.height = "44px"; 
  addMessage("user", text);

  // 沉浸模式下处理 UI 变化 (对方正在输入)
  const isImmersive = isImmersiveMode();
  let originalTitle = aiTitleTextEl.textContent;
  let originalSig = signatureEl.textContent;
  let immersiveTimer = null;

  if (isImmersive) {
      immersiveTimer = setTimeout(() => {
          aiTitleTextEl.textContent = "对方正在输入...";
          signatureEl.style.display = "none"; 
      }, 500);
  }

  // 构建 Prompt
  let sysPrompt = `现在是 ${getBeijingTime()}（北京时间），用户提示：${userPromptEl.value||""}`;
  
  if(isMemoryEnabled()){
     const memJson = JSON.stringify(memories);
     sysPrompt += `
\n你拥有长期记忆功能。
当前记忆库：
<memory>
${memJson}
</memory>

行为准则：
​记忆库中包含了用户的姓名、偏好、过去提到的重要事件等。
​即使当前的对话历史被清空，你也要根据记忆库的内容来保持人设的一致性。
​在对话中要自然地流露出你记得这些信息。

你拥有添加记忆的能力：
​##十分重要：如果用户提到了新的重要个人信息，请在回复的开头增加一个特殊格式：

[UPDATE_MEMORY:"内容"]
#该工具为增加记忆

[SETDATE_MEMORY:"内容",number:"需要修改的记忆的序号"]
#该工具为更改记忆

##必须严格按照以上格式进行回复，一旦使用两个标签，一定要将标签置于对话最前
`;
  }

  const apiMessages = [{role:"system", content: sysPrompt}];
  for(const m of messages){
    if(m.role==="assistant" && m.content==="_typing") continue;
    if(m.role === "assistant" || m.role === "user") apiMessages.push({role:m.role, content:m.content});
  }

  const placeholderId = `m_${Date.now()}_${Math.floor(Math.random()*1000)}`;
  const placeholderReasonCollapsed = (isReasoningEnabled() && isDefaultReasonCollapsed());
  addMessage("assistant","_typing",{id:placeholderId, reasoning: null, reasonCollapsed: placeholderReasonCollapsed});
  let replyMessageIndex = messages.findIndex(mm => mm.id === placeholderId);
  if(replyMessageIndex === -1) replyMessageIndex = messages.length - 1;

  try {
    const apiKey = getApiKey();
    if(!apiKey) throw new Error("请在设置中填写 API Key");

    const modelToUse = isReasoningEnabled() ? MODEL_REASONER : MODEL_CHAT;
    const res = await fetch(API_BASE + "/chat/completions", {
      method: "POST",
      headers: { "Content-Type":"application/json", "Authorization":"Bearer "+apiKey },
      body: JSON.stringify({ model: modelToUse, messages: apiMessages, stream: true })
    });

    if(!res.ok) throw new Error(`API Error ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder("utf-8");
    
    let reply = {
        role: "assistant", 
        content: "", 
        reasoning: null, 
        reasonCollapsed: placeholderReasonCollapsed, 
        id: placeholderId,
        memoryInfo: { logs: [], backup: null, reverted: false } 
    };
    messages[replyMessageIndex] = reply;

    let buffer = ""; 
    let checkTags = isMemoryEnabled(); 
    let streamBuffer = ""; 

    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      buffer += decoder.decode(value, {stream:true});
      const parts = buffer.split("\n\n");
      buffer = parts.pop();

      for(const part of parts){
        if(!part.startsWith("data:")) continue;
        const data = part.slice(5).trim();
        if(!data || data==="[DONE]") continue;
        try{
          const obj = JSON.parse(data);
          const delta = obj.choices?.[0]?.delta || {};
          
          if(delta.reasoning_content){
            reply.reasoning = (reply.reasoning || "") + delta.reasoning_content;
            messages[replyMessageIndex] = reply;
            renderMessages();
          }

          if(delta.content){
            const newContent = delta.content;

            if(checkTags){
                streamBuffer += newContent;
                if(!streamBuffer.trimStart().startsWith("[")){
                    reply.content += streamBuffer;
                    streamBuffer = "";
                    checkTags = false; 
                } else {
                    while(true) {
                        const startIndex = streamBuffer.indexOf("[");
                        const endIndex = streamBuffer.indexOf("]");
                        
                        if(startIndex !== -1 && endIndex !== -1 && endIndex > startIndex){
                            const tagStr = streamBuffer.substring(startIndex, endIndex + 1);
                            const result = executeMemoryTags(tagStr);
                            
                            if(result.hasUpdate){
                                if(reply.memoryInfo.backup === null) reply.memoryInfo.backup = result.backup;
                                reply.memoryInfo.logs.push(...result.logs);
                            } else {
                                reply.content += tagStr; 
                            }
                            streamBuffer = streamBuffer.substring(endIndex + 1);
                        } else {
                            break;
                        }
                    }
                    if(streamBuffer.length > 0 && !streamBuffer.trimStart().startsWith("[")){
                        reply.content += streamBuffer;
                        streamBuffer = "";
                        checkTags = false;
                    }
                }
            } else {
                reply.content += newContent;
            }
            messages[replyMessageIndex] = reply;
            renderMessages();
          }
        }catch(e){}
      }
    }
    
    if(streamBuffer){
        reply.content += streamBuffer;
        messages[replyMessageIndex] = reply;
        renderMessages();
    }
    
  }catch(e){
    messages[replyMessageIndex] = {role:"assistant", content: "\n[错误] " + e.message, id:placeholderId};
    renderMessages();
  } finally {
      // 沉浸模式：恢复 UI
      if(isImmersive) {
          if(immersiveTimer) clearTimeout(immersiveTimer);
          aiTitleTextEl.textContent = originalTitle; // 恢复之前的标题(昵称)
          signatureEl.textContent = originalSig;
          signatureEl.style.display = ""; // 恢复显示
      }
  }
}

/* ---------- UI Events ---------- */
openSettingsBtn.addEventListener("click", ()=>{ loadSettings(); settingsModal.style.display="flex"; });
closeSettingsBtn.addEventListener("click", ()=>{ settingsModal.style.display="none"; });
saveSettingsBtn.addEventListener("click", ()=>{ saveSettings(); settingsModal.style.display="none"; renderMessages(); });

clearHistoryBtn.addEventListener("click", ()=>{ confirmModal.style.display = "flex"; });
confirmClearBtn.addEventListener("click", ()=>{ messages = []; localStorage.removeItem(STORAGE_KEY); renderMessages(); confirmModal.style.display = "none"; });
cancelClearBtn.addEventListener("click", ()=>{ confirmModal.style.display = "none"; });

sendBtn.addEventListener("click", sendMessage);
inputEl.addEventListener("keydown", (e)=>{
  if((e.key === "Enter") && (e.ctrlKey || e.metaKey)){ e.preventDefault(); sendMessage(); setExpandedState(false); }
});
inputEl.addEventListener('input', ()=>{
  setExpandedState(true);
  inputEl.style.height = "auto"; inputEl.style.height = Math.min(inputEl.scrollHeight,240)+"px";
});

const BASE_BOTTOM_HEIGHT = 76; 
function updateForViewport(){
  const vv = window.visualViewport;
  let kb = 0;
  if(vv){ kb = Math.max(0, window.innerHeight - vv.height - (vv.offsetTop || 0)); }
  else { kb = Math.max(0, window.innerHeight - document.documentElement.clientHeight); }
  bottomEl.style.bottom = (kb > 0 ? kb + 'px' : '0px');
  document.documentElement.style.setProperty('--bottom-height', `${BASE_BOTTOM_HEIGHT + kb}px`);
  setTimeout(()=>{ const container = msgsEl.parentElement; container.scrollTop = container.scrollHeight; }, 120);
}
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', updateForViewport, {passive:true});
  window.visualViewport.addEventListener('scroll', updateForViewport, {passive:true});
}
window.addEventListener('resize', updateForViewport);
inputEl.addEventListener('focus', ()=>{ setExpandedState(true); setTimeout(()=>{ updateForViewport(); msgsEl.parentElement.scrollTop = msgsEl.parentElement.scrollHeight; }, 250); });
inputEl.addEventListener('blur', ()=>{ setTimeout(()=>{ if(!inputEl.value.trim()) setExpandedState(false); updateForViewport(); }, 160); });

function setExpandedState(expand){
  if(expand){ inputEl.classList.remove("collapsed"); inputEl.classList.add("expanded"); inputEl.style.width = ""; }
  else { if(inputEl.value && inputEl.value.trim()) return; inputEl.classList.remove("expanded"); inputEl.classList.add("collapsed"); inputEl.style.height = "44px"; inputEl.style.width = ""; }
}

window.addEventListener("load", ()=>{
  loadSettings();
  if(!inputEl.value || !inputEl.value.trim()) inputEl.classList.add("collapsed"); else inputEl.classList.add("expanded");
  renderMessages();
  updateForViewport();
});
</script>
